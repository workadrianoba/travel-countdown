<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Countdown Timer</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #0d0d0d;
      color: #f0f0f0;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(1.2rem, 4vw, 2rem);
      padding: 1.5rem;
    }

    h1 {
      font-size: clamp(0.85rem, 3.5vw, 1.1rem);
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #aaa;
      text-align: center;
      line-height: 1.5;
    }

    .target-date {
      font-size: clamp(0.75rem, 3vw, 0.9rem);
      color: #555;
      letter-spacing: 0.08em;
      text-align: center;
    }

    .timer {
      display: flex;
      gap: clamp(0.6rem, 3vw, 1.5rem);
      align-items: flex-end;
    }

    .unit {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
    }

    .value {
      font-size: clamp(4.5rem, 22vw, 7rem);
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.02em;
      font-variant-numeric: tabular-nums;
      min-width: 2ch;
      text-align: center;
      background: linear-gradient(180deg, #ffffff 0%, #a0a0a0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .label {
      font-size: clamp(0.65rem, 2.5vw, 0.8rem);
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #666;
    }

    .separator {
      font-size: clamp(3.5rem, 16vw, 5.5rem);
      font-weight: 300;
      color: #333;
      line-height: 1;
      padding-bottom: 0.7rem;
      user-select: none;
    }

    .expired {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      text-align: center;
      padding: 1rem;
    }

    .expired-text {
      font-size: clamp(2rem, 10vw, 3.5rem);
      font-weight: 700;
      color: #ff4444;
      letter-spacing: -0.02em;
    }

    .expired-sub {
      font-size: clamp(0.8rem, 3vw, 0.95rem);
      color: #666;
      letter-spacing: 0.08em;
    }

    .progress-bar-container {
      width: min(560px, 92vw);
      height: 3px;
      background: #1a1a1a;
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #3a7bd5, #00d2ff);
      border-radius: 2px;
      transition: width 1s linear;
    }
  </style>
</head>
<body>

  <h1>Contagem Regressiva Chegada da Bruninha</h1>
  <p class="target-date">01 de junho de 2026 &mdash; 15:00 (Brasília)</p>

  <div class="timer" id="timer">
    <div class="unit">
      <span class="value" id="hours">00</span>
      <span class="label">Horas</span>
    </div>
    <div class="separator">:</div>
    <div class="unit">
      <span class="value" id="minutes">00</span>
      <span class="label">Minutos</span>
    </div>
    <div class="separator">:</div>
    <div class="unit">
      <span class="value" id="seconds">00</span>
      <span class="label">Segundos</span>
    </div>
  </div>

  <div class="progress-bar-container">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <div class="expired" id="expired">
    <span class="expired-text">Tempo esgotado!</span>
    <span class="expired-sub">01/06/2026 15:00 — Brasília</span>
  </div>

  <script>
    // 2026-06-01 15:00:00 horário de Brasília (UTC-3)
    // Equivale a 2026-06-01T18:00:00Z em UTC
    const TARGET = new Date('2026-06-01T18:00:00Z');

    // Data de referência para a barra de progresso:
    // usamos o momento em que a página foi aberta (ou poderia ser uma data de início fixa)
    const PAGE_LOAD = Date.now();

    function pad(n) {
      return String(n).padStart(2, '0');
    }

    function tick() {
      const now = Date.now();
      const diff = TARGET.getTime() - now;

      if (diff <= 0) {
        document.getElementById('timer').style.display = 'none';
        document.querySelector('.progress-bar-container').style.display = 'none';
        document.getElementById('expired').style.display = 'flex';
        return;
      }

      const totalSeconds = Math.floor(diff / 1000);
      const hours   = Math.floor(totalSeconds / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;

      document.getElementById('hours').textContent   = pad(hours);
      document.getElementById('minutes').textContent = pad(minutes);
      document.getElementById('seconds').textContent = pad(seconds);

      // Barra de progresso: percentual do tempo total transcorrido
      const totalSpan = TARGET.getTime() - (TARGET.getTime() - (7 * 24 * 3600 * 1000)); // últimos 7 dias como janela de referência
      const elapsed   = now - PAGE_LOAD;
      const remaining = TARGET.getTime() - PAGE_LOAD;
      const pct       = remaining > 0 ? Math.max(0, Math.min(100, (elapsed / remaining) * 100)) : 100;
      document.getElementById('progressBar').style.width = pct + '%';
    }

    tick();
    setInterval(tick, 1000);
  </script>

</body>
</html>
